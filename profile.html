<!DOCTYPE html>
<html lang="vi">
<head>
    <style>
        :root {
            --bg-modal: #1a1c1a;
            --input-bg: #1e2621;
            --input-border: #2d3b33;
            --pink-btn: #ff4d8d;
            --text-gray: #a0a0a0;
        }

        .modal-container {
            background: var(--bg-modal);
            width: 400px;
            padding: 30px;
            border-radius: 20px;
            color: white;
            font-family: sans-serif;
            border: 1px solid #333;
        }

        .field-group { margin-bottom: 20px; }
        .field-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9em; }
        
        input {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
        }

        .btn-register {
            width: 100%;
            padding: 18px;
            background: var(--pink-btn);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
        }

        .footer-link { text-align: center; margin-top: 15px; font-size: 0.85em; color: var(--text-gray); }
        .footer-link a { color: #8FBDF4; text-decoration: none; }
    </style>
</head>
<body>

<div class="modal-container">
    <h2 style="text-align: center;">ĐĂNG KÝ THÀNH VIÊN</h2>
    
    <div class="field-group">
        <label>👤 BIỆT DANH CỦA BẠN:</label>
        <input type="text" placeholder="Nhập biệt danh hiển thị...">
    </div>

    <div class="field-group">
        <label>📧 ĐỊA CHỈ EMAIL:</label>
        <input type="email" placeholder="name@example.com">
    </div>

    <div class="field-group">
        <label>🔑 MẬT KHẨU TỰ CHỌN:</label>
        <input type="password" placeholder="Tự chọn mật khẩu riêng...">
    </div>

    <button class="btn-register">ĐĂNG KÝ TÀI KHOẢN THẬT</button>
    
    <div class="footer-link">
        Đã có tài khoản rồi? <a href="#">Bấm vào đây để Đăng nhập</a>
    </div>
</div>

</body>
</html>
