<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Yểm Hử Đông | Access Portal</title>
    <style>
        :root {
            --primary: #8FBDF4;
            --dark-bg: #121212;
            --input-bg: #1e1e24;
            --neon-pink: #FF007F;
            --text-light: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }

        /* Header */
        header { background: var(--primary); padding: 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .btn-auth { cursor: pointer; background: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; color: var(--primary); }

        /* Profile */
        .profile-card { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); text-align: center; }
        .avatar { width: 120px; height: 120px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; }

        /* Modal Dark Mode */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--dark-bg); padding: 40px; width: 320px; border-radius: 15px; color: white; text-align: center; border: 1px solid #333; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: var(--input-bg); border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-pink { background: var(--neon-pink); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 10px; }
        .link { font-size: 0.85em; color: var(--primary); cursor: pointer; margin-top: 15px; display: inline-block; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>Yểm Hử Đông</h1>
    <button class="btn-auth" onclick="showModal('login')">Đăng nhập</button>
</header>

<div class="profile-card">
    <div class="avatar"></div>
    <h2>Yểm Hử Đông</h2>
    <p>Người đồng hành trí tuệ của bạn.</p>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <!-- Login Form -->
        <div id="login-form">
            <h2>Đăng nhập</h2>
            <input type="text" placeholder="Tên đăng nhập">
            <input type="password" placeholder="Mật khẩu">
            <label style="display:block; font-size: 0.8em; text-align: left; color: #888;">
                <input type="checkbox"> Ghi nhớ đăng nhập
            </label>
            <button class="btn-pink">ĐĂNG NHẬP</button>
            <p class="link" onclick="showModal('forgot')">Quên mật khẩu?</p>
        </div>

        <!-- Forgot Password Form -->
        <div id="forgot-form" class="hidden">
            <h2>Khôi phục mật khẩu</h2>
            <input type="email" placeholder="Nhập email của bạn">
            <button class="btn-pink" onclick="showModal('verify')">GỬI MÃ XÁC NHẬN</button>
        </div>

        <!-- Verify Code Form -->
        <div id="verify-form" class="hidden">
            <h2>Xác thực</h2>
            <input type="text" placeholder="Nhập mã 6 chữ số">
            <button class="btn-pink">XÁC MINH</button>
        </div>

        <p class="link" onclick="closeModal()">Đóng</p>
    </div>
</div>

<script>
    function showModal(type) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('forgot-form').classList.add('hidden');
        document.getElementById('verify-form').classList.add('hidden');
        document.getElementById(type + '-form').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
