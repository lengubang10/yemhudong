<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yểm Hử Đông - Trang Chủ</title>
    <!-- Nhúng font chữ tròn cute -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode" oncontextmenu="return false;" onselectstart="return false;">

    <!-- 1. HEADER: Gọn gàng thanh thoát -->
    <header>
        <div class="logo" onclick="location.href='index.html'">✨ Yểm Hử Đông ✨</div>
        <div class="header-right">
            <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
            <a href="profile.html" class="btn-cute"><i class="fas fa-user"></i> Hồ sơ</a>
        </div>
    </header>

    <!-- Khu vực chính của Trang Chủ -->
    <main class="main-homepage">
        
        <!-- 2. KHU TÌM KIẾM & BỘ LỌC (Gom gọn một chỗ) -->
        <section class="search-filter-section">
            <div class="search-bar">
                <input type="text" placeholder="Tìm tên truyện hoặc thể loại...">
                <button><i class="fas fa-search"></i></button>
            </div>
            
            <!-- Danh sách thể loại nhanh để lọc -->
            <div class="tags-container">
                <span class="tag-item active">Tất cả</span>
                <span class="tag-item">Danmei</span>
                <span class="tag-item">Ngôn Tình</span>
                <span class="tag-item">Huyền Huyễn</span>
                <span class="tag-item">ABO</span>
                <span class="tag-item">Đô Thị</span>
            </div>
        </section>

        <!-- 3. KHU TRUYỆN MỚI CẬP NHẬT (Chia lưới ngăn nắp) -->
        <section class="story-grid-section">
            <h3 class="section-title"><i class="fas fa-star" style="color: #f1c40f;"></i> Truyện Mới Cập Nhật</h3>
            
            <div class="story-grid">
                <!-- Truyện số 1 -->
                <div class="story-card" onclick="location.href='reading.html'">
                    <div class="story-cover-wrapper">
                        <img src="https://via.placeholder.com/150x200/8FBDF4/ffffff?text=Yem+Hu+Dong" alt="Bìa truyện" class="story-cover">
                        <span class="badge-hot">Hot</span>
                    </div>
                    <div class="story-card-info">
                        <h4>Yểm Hử Đông Truyện Ký</h4>
                        <p class="story-author">Tác giả: Gió Nhỏ</p>
                        <span class="story-genre">Fantasy, ABO</span>
                    </div>
                </div>

                <!-- Truyện số 2 -->
                <div class="story-card">
                    <div class="story-cover-wrapper">
                        <img src="https://via.placeholder.com/150x200/a0e7e5/ffffff?text=Dam+My+Cute" alt="Bìa truyện" class="story-cover">
                    </div>
                    <div class="story-card-info">
                        <h4>Tình Yêu Màu Xanh Pastel</h4>
                        <p class="story-author">Tác giả: Thỏ Bông</p>
                        <span class="story-genre">Danmei, Hiện Đại</span>
                    </div>
                </div>

                <!-- Truyện số 3 -->
                <div class="story-card">
                    <div class="story-cover-wrapper">
                        <img src="https://via.placeholder.com/150x200/ffc6ff/ffffff?text=Xuyen+Khong" alt="Bìa truyện" class="story-cover">
                        <span class="badge-hot" style="background: #ff7675;">New</span>
                    </div>
                    <div class="story-card-info">
                        <h4>Vận Tĩnh Lặng Trời</h4>
                        <p class="story-author">Tác giả: Cổ Phong</p>
                        <span class="story-genre">Cổ Đại, Trọng Sinh</span>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
